name: Psybeam
options:
  bundleIdPrefix: com.guitaripod
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_REGION_BASED_ISOLATION: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${PSYBEAM_TEAM_ID}
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  PsybeamKit:
    path: .
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "147.0.0"

targets:
  Psybeam:
    type: application
    platform: iOS
    sources:
      - path: Psybeam
        excludes:
          - "Secrets.example.swift"
      - path: Psybeam/Secrets.swift
        optional: true
    dependencies:
      - package: PsybeamKit
        product: PsybeamKit
      - package: GRDB
      - package: WebRTC
    info:
      path: Psybeam/Info.plist
      properties:
        CFBundleDisplayName: Psybeam
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UIRequiredDeviceCapabilities:
          - arm64
        UIViewControllerBasedStatusBarAppearance: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Psybeam uses the microphone to capture speech for live voice translation.
        NSLocationWhenInUseUsageDescription: Psybeam suggests the local language for where you are as you cross borders.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Psybeam/Psybeam.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PSYBEAM_BUNDLE_ID}
        PRODUCT_NAME: Psybeam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.travel
        INFOPLIST_KEY_UIRequiresFullScreen: YES

schemes:
  Psybeam:
    build:
      targets:
        Psybeam: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
