name: Psybeam
options:
  bundleIdPrefix: com.guitaripod
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_UPCOMING_FEATURE_REGION_BASED_ISOLATION: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${PSYBEAM_TEAM_ID}
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  PsybeamKit:
    path: .
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "147.0.0"
  AICredits:
    url: git@github.com:guitaripod/AICredits.git
    from: "1.4.0"
  MidgarKit:
    url: https://github.com/guitaripod/MidgarKit
    from: "2.0.0"

targets:
  Psybeam:
    type: application
    platform: iOS
    sources:
      - path: Psybeam
        excludes:
          - "Secrets.example.swift"
      - path: Psybeam/Secrets.swift
        optional: true
    dependencies:
      - package: PsybeamKit
        product: PsybeamKit
      - package: GRDB
      - package: WebRTC
      - package: AICredits
        product: AICreditsCore
      - package: AICredits
        product: AICreditsRevenueCat
      - package: AICredits
        product: AICreditsUI
      - package: MidgarKit
    info:
      path: Psybeam/Info.plist
      properties:
        CFBundleDisplayName: Psybeam
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UIRequiredDeviceCapabilities:
          - arm64
        UIViewControllerBasedStatusBarAppearance: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: Psybeam uses the microphone to capture speech for live voice translation.
        NSLocationWhenInUseUsageDescription: Psybeam suggests the local language for where you are as you cross borders.
        NSCameraUsageDescription: Psybeam does not take photos or videos. Camera access is requested only by the real-time audio framework and is never used.
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
    entitlements:
      path: Psybeam/Psybeam.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PSYBEAM_BUNDLE_ID}
        PRODUCT_NAME: Psybeam
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.travel
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        # Manual signing on the app target's Release config only — global
        # overrides would leak onto RevenueCat's SPM targets, which reject
        # provisioning profiles. Local work uses Debug (automatic signing);
        # App Store archives happen exclusively in release CI.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Psybeam App Store 2026"

  PsybeamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PsybeamTests
    dependencies:
      - target: Psybeam
      - package: PsybeamKit
        product: PsybeamKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ${PSYBEAM_BUNDLE_ID}.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Psybeam.app/Psybeam
        BUNDLE_LOADER: $(TEST_HOST)
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  Psybeam:
    build:
      targets:
        Psybeam: all
        PsybeamTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PsybeamTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
